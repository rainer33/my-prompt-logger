<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Logger</title>
  <link rel="stylesheet" href="popup.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>Prompt Logger</h1>
        <div class="header-sub">AI 대화 기록을 한눈에 관리</div>
      </div>
      <div class="header-actions">
        <button class="btn-export" id="btnExport">엑셀 다운로드</button>
        <button class="btn-clear" id="btnClear">전체 삭제</button>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="프롬프트 또는 응답 검색..." />
      <select id="siteFilter">
        <option value="all">전체 사이트</option>
        <option value="chatgpt">ChatGPT</option>
        <option value="claude">Claude</option>
        <option value="gemini">Gemini</option>
      </select>
    </div>

    <div class="count-bar">
      <div id="countBar">불러오는 중...</div>
      <div id="debugBar" class="debug-bar"></div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div>
        <h2>프롬프트</h2>
        <div class="modal-text" id="modalPrompt"></div>
      </div>
      <div>
        <h2>응답</h2>
        <div class="modal-text" id="modalResponse"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-close" id="btnClose">닫기</button>
        <button class="btn-delete" id="btnModalDelete">삭제</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
